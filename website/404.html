<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found — Trigger Engage</title>
<meta name="robots" content="noindex,follow">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#070b14">
<style>
  @font-face{font-family:'Instrument Sans';src:url('/assets/fonts/instrument-sans-600.woff2') format('woff2');font-weight:600;font-display:swap}
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:#070b14;color:#e9eef7;font-family:'Instrument Sans',ui-sans-serif,system-ui,sans-serif;text-align:center;padding:24px}
  .m{max-width:520px}
  .mark{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-weight:600;color:#04120b;background:linear-gradient(160deg,#5ff0bd,#34d399);margin:0 auto 24px}
  h1{font-size:64px;margin:0;letter-spacing:-.03em;background:linear-gradient(100deg,#5ff0bd,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent}
  p{color:#95a5bd;font-size:18px;margin:12px 0 28px}
  a.btn{display:inline-flex;gap:8px;align-items:center;background:linear-gradient(180deg,#5ff0bd,#34d399);color:#04120b;font-weight:600;text-decoration:none;padding:12px 20px;border-radius:12px}
  a.ghost{color:#95a5bd;text-decoration:none;margin-left:14px}
  a.ghost:hover{color:#e9eef7}
</style>
</head>
<body>
  <div class="m">
    <div class="mark">TE</div>
    <h1>404</h1>
    <p>That page fired an event we didn't have a journey for. Let's get you back on track.</p>
    <a class="btn" href="/">Back to home</a>
    <a class="ghost" href="/blog/">Read the blog →</a>
  </div>
</body>
</html>
