# Render Blueprint — deploys the marketing site (website/) as a static site.
# Docs: https://render.com/docs/blueprint-spec
previews:
  generation: automatic # PR preview environments

services:
  - type: web
    name: trigger-engage-site
    runtime: static
    branch: main
    buildCommand: "true" # no build — plain static HTML/CSS
    staticPublishPath: ./website
    domains:
      - triggerengage.com
      - www.triggerengage.com
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: "geolocation=(), microphone=(), camera=()"
      - path: /assets/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
      - path: /assets/fonts/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
